e">123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br><span class="line">128</span><br><span class="line">129</span><br><span class="line">130</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">/**</span></span><br><span class="line"><span class="comment"> * Description:获取操作日志相关信息</span></span><br><span class="line"><span class="comment"> * &lt;p&gt;</span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"><span class="meta">@Aspect</span></span><br><span class="line"><span class="meta">@Component</span></span><br><span class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">Log_Aspect</span> </span>&#123;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">private</span> <span class="keyword">final</span> String ExpGetResultDataPonit = <span class="string">"execution( * com.sailing.dscg.controller.*.*.*(..))"</span>;</span><br><span class="line">    <span class="meta">@Autowired</span></span><br><span class="line">    <span class="keyword">private</span> IServicelogService servicelogService;</span><br><span class="line"></span><br><span class="line">    <span class="comment">/**</span></span><br><span class="line"><span class="comment">     * 获取动作</span></span><br><span class="line"><span class="comment">     * Controller下的类的所有的方法</span></span><br><span class="line"><span class="comment">     */</span></span><br><span class="line">    <span class="meta">@Pointcut</span>(ExpGetResultDataPonit)</span><br><span class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">serviceLogCell</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="meta">@Around</span>(<span class="string">"serviceLogCell()"</span>)</span><br><span class="line">    <span class="function"><span class="keyword">public</span> Object <span class="title">queryListCellLog</span><span class="params">(ProceedingJoinPoint pjd)</span> <span class="keyword">throws</span> Throwable </span>&#123;</span><br><span class="line">        Object result = <span class="keyword">null</span>;</span><br><span class="line"><span class="comment">//        ProceedingJoinPoint pjd = (ProceedingJoinPoint) joinPoint;</span></span><br><span class="line">        <span class="keyword">try</span> &#123;</span><br><span class="line">            Object[] args = pjd.getArgs();</span><br><span class="line">            result = pjd.proceed(args);</span><br><span class="line"></span><br><span class="line">            <span class="comment">//添加servicelog日志</span></span><br><span class="line">            insertServiceLog(pjd, result);</span><br><span class="line"></span><br><span class="line">        &#125; <span class="keyword">catch</span> (Throwable e) &#123;</span><br><span class="line">            <span class="keyword">throw</span> <span class="keyword">new</span> RuntimeException(e);</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">return</span> result;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">boolean</span> <span class="title">insertServiceLog</span><span class="params">(ProceedingJoinPoint pjd, Object object)</span> <span class="keyword">throws</span> Throwable </span>&#123;</span><br><span class="line"></span><br><span class="line">        RespData respData;</span><br><span class="line">        <span class="keyword">boolean</span> result = <span class="keyword">false</span>;</span><br><span class="line">        <span class="keyword">boolean</span> exist = <span class="keyword">false</span>;</span><br><span class="line"></span><br><span class="line">        <span class="keyword">if</span> (object != <span class="keyword">null</span>) &#123;</span><br><span class="line">            respData = (RespData) object;</span><br><span class="line"></span><br><span class="line">        &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">            <span class="keyword">return</span> <span class="keyword">false</span>;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="comment">//非Servlet类中初始化HttpServletRequest</span></span><br><span class="line">        HttpServletRequest request = ((ServletRequestAttributes) RequestContextHolder.getRequestAttributes()).getRequest();</span><br><span class="line">        HttpSession session = request.getSession();</span><br><span class="line"></span><br><span class="line">        <span class="comment">//获取Ip</span></span><br><span class="line">        String accessIp = request.getHeader(<span class="string">"x-forwarded-for"</span>);</span><br><span class="line">        <span class="keyword">if</span> (accessIp == <span class="keyword">null</span> || accessIp.length() == <span class="number">0</span>) &#123;</span><br><span class="line">            accessIp = request.getRemoteAddr();</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        Admin admin = (Admin) session.getAttribute(<span class="string">"admin"</span>);</span><br><span class="line">        <span class="comment">//获取访问路径</span></span><br><span class="line">        String accessPath = request.getRequestURI();</span><br><span class="line">        <span class="comment">//获取访问方法</span></span><br><span class="line">        String accessMethod = pjd.getSignature().getName();</span><br><span class="line">        <span class="comment">//获取访问参数</span></span><br><span class="line">        Object[] accessParams = pjd.getArgs();</span><br><span class="line"></span><br><span class="line">        <span class="comment">//获取操作类型</span></span><br><span class="line">        String operateType = <span class="string">""</span>;</span><br><span class="line"></span><br><span class="line">        <span class="comment">//反射获取原方法</span></span><br><span class="line">        Signature signature = pjd.getSignature();</span><br><span class="line">        MethodSignature methodSignature = (MethodSignature) signature;</span><br><span class="line">        Method targetMethod = methodSignature.getMethod();              <span class="comment">//  代理方法</span></span><br><span class="line">        Method realMethod = pjd.getTarget().getClass().getDeclaredMethod(signature.getName(), targetMethod.getParameterTypes());</span><br><span class="line"></span><br><span class="line">        <span class="keyword">if</span> (realMethod.isAnnotationPresent(OperateType.class)) &#123;</span><br><span class="line">            OperateType operate = realMethod.getAnnotation(OperateType.class);</span><br><span class="line">            operateType = operate.oprateTypeName();</span><br><span class="line"></span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        Servicelog servicelog = <span class="keyword">new</span> Servicelog();</span><br><span class="line"></span><br><span class="line">        <span class="keyword">if</span> (admin == <span class="keyword">null</span>) &#123;</span><br><span class="line">            servicelog.setUserName(<span class="string">"Others"</span>);</span><br><span class="line">            servicelog.setLoginName(<span class="string">"Others"</span>);</span><br><span class="line">            servicelog.setRoleName(<span class="string">""</span>);</span><br><span class="line">        &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">            servicelog.setUserName(admin.getUserName());</span><br><span class="line">            servicelog.setLoginName(admin.getLoginName());</span><br><span class="line">            <span class="keyword">if</span>(admin.getLoginName().equals(<span class="string">"admin"</span>))&#123;</span><br><span class="line">                servicelog.setRoleName(<span class="string">"管理员"</span>);</span><br><span class="line">            &#125;<span class="keyword">else</span>&#123;</span><br><span class="line">                servicelog.setRoleName(admin.getRole().getName());</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        servicelog.setAccessIp(accessIp);</span><br><span class="line">        servicelog.setAccessPath(accessPath);</span><br><span class="line">        servicelog.setAccessMethod(accessMethod);</span><br><span class="line">        servicelog.setAccessTime(DateTool.getCurrentDate());</span><br><span class="line">        <span class="keyword">if</span> (StringUtils.isBlank(operateType) ) &#123;</span><br><span class="line">            exist = <span class="keyword">true</span>;</span><br><span class="line">        &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">            servicelog.setOperateType(operateType);</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">if</span> (accessParams != <span class="keyword">null</span>) &#123;</span><br><span class="line">            StringBuffer sb = <span class="keyword">new</span> StringBuffer();</span><br><span class="line">            sb.append(<span class="string">"["</span>);</span><br><span class="line">            <span class="keyword">for</span> (Object obj:accessParams) &#123;</span><br><span class="line">                <span class="keyword">if</span>(obj <span class="keyword">instanceof</span> HttpServletRequest) <span class="keyword">continue</span>;</span><br><span class="line">                sb.append(JSONObject.toJSONString(obj));</span><br><span class="line">            &#125;</span><br><span class="line">            sb.append(<span class="string">"]"</span>);</span><br><span class="line">            servicelog.setAccessParams(sb.toString().replaceAll(<span class="string">"\\\\"</span>,<span class="string">""</span>));</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        servicelog.setStateMsg(respData.getReason());</span><br><span class="line">        servicelog.setCreateTime(DateTool.getCurrentDate());</span><br><span class="line">        <span class="keyword">if</span> (!exist) &#123;</span><br><span class="line">            result = servicelogService.save(servicelog);</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        <span class="keyword">return</span> result;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
